<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
    <link rel="stylesheet" href="game.css">
    <script src="game.js"></script>
    <title>Ordember</title>
</head>

<body>
    <div id="header">
        <div id="stats" aria-label="Game progress">
            <div><span class="stat-label">Level</span><span id="level">1</span></div>
            <div><span class="stat-label">Score</span><span id="score">0</span></div>
            <div><span class="stat-label">Lives</span><span id="lives"></span></div>
        </div>
        <button id="banner" type="button" aria-label="Continue game"></button>
        <button id="close" type="button" onclick="stop()" aria-label="Back to menu">&times;</button>
    </div>
    <div id="pieces">
    </div>
</body>

</html>
